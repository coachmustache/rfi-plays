<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>YRFI / NRFI Model Summary</title>

  <style>
    :root {
      --bg: #0b1220;
      --card: #111a2b;
      --card2: #151f33;
      --text: #f4f7fb;
      --muted: #9ca8ba;
      --line: rgba(255,255,255,0.12);
      --green: #74c365;
      --red: #ff5b5b;
      --yellow: #f4c542;
      --blue: #5aa9ff;
      --shadow: 0 18px 40px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(39, 174, 96, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(90, 169, 255, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: min(1280px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 22px;
      border-bottom: 1px solid rgba(116, 195, 101, 0.55);
      padding-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .status-pill {
      background: rgba(116, 195, 101, 0.13);
      border: 1px solid rgba(116, 195, 101, 0.45);
      color: var(--green);
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
    }

    .model-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .model-card {
      background: linear-gradient(180deg, rgba(21,31,51,0.98), rgba(17,26,43,0.98));
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .model-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .model-title {
      font-size: 24px;
      font-weight: 950;
      letter-spacing: -0.02em;
    }

    .model-tag {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .content {
      padding: 18px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .mini-card {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px;
      min-height: 86px;
    }

    .mini-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1.25;
    }

    .mini-value {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 950;
    }

    .positive {
      color: var(--green);
    }

    .negative {
      color: var(--red);
    }

    .section {
      margin-top: 18px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 950;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 12px rgba(116, 195, 101, 0.75);
    }

    .stat-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 14px;
    }

    .stat-label {
      color: var(--muted);
      font-weight: 800;
    }

    .stat-value {
      font-weight: 950;
      text-align: right;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 480px;
    }

    th, td {
      padding: 10px 11px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 13px;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 950;
      background: rgba(255,255,255,0.035);
    }

    td {
      font-weight: 800;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .empty {
      text-align: center;
      padding: 38px 20px;
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(17, 26, 43, 0.55);
    }

    .footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 1080px) {
      .model-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .header {
        align-items: flex-start;
        flex-direction: column;
      }

      .quick-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat-list {
        grid-template-columns: 1fr;
      }

      .model-title {
        font-size: 20px;
      }
    }

    @media (max-width: 460px) {
      .page {
        width: min(100% - 18px, 1280px);
        padding-top: 18px;
      }

      .quick-grid {
        grid-template-columns: 1fr;
      }

      .content {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <div>
        <h1>YRFI / NRFI Model Summary</h1>
        <div class="subtitle" id="lastUpdated">Loading summary...</div>
      </div>
      <div class="status-pill" id="todayLabel">Today</div>
    </header>

    <section class="model-grid" id="modelGrid">
      <div class="empty">Loading model summaries...</div>
    </section>

    <div class="footer">
      Pulls from the published Game_Backtest CSV summary area. Auto-refreshes every 60 seconds.
    </div>
  </main>

  <script>
    /************************************************************
     * CONFIG
     * Use the published CSV links for each Game_Backtest sheet.
     ************************************************************/

    const SOURCES = [
      {
        name: "V1",
        url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_1lOdsXHuX6EVik0beeAUXFck7o0pOuElAB3B6tWoAh2n_wq2iID5IhLfbJJ19ijlU6Qfj-0_tVhi/pub?gid=1064158788&single=true&output=csv"
      },
      {
        name: "V2",
        url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7XfJbgPEN8Mo_nf1evZ3Hb7ec5il5MlOFEgSaClIPuHdEAUq7XMpN5Bc4XOPBas4hQj0juKsMZJr2/pub?gid=1064158788&single=true&output=csv"
      }
    ];

    const AUTO_REFRESH_MS = 60000;

    /************************************************************
     * CSV PARSER
     ************************************************************/

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
          continue;
        }

        if (char === '"') {
          inQuotes = !inQuotes;
          continue;
        }

        if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
          continue;
        }

        if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;

          row.push(cell);

          if (row.some(v => String(v).trim() !== "")) {
            rows.push(row);
          }

          row = [];
          cell = "";
          continue;
        }

        cell += char;
      }

      row.push(cell);

      if (row.some(v => String(v).trim() !== "")) {
        rows.push(row);
      }

      return rows;
    }

    /************************************************************
     * SUMMARY EXTRACTION
     ************************************************************/

    function clean(value) {
      return String(value ?? "").trim();
    }

    function normalizeLabel(value) {
      return clean(value)
        .toLowerCase()
        .replace(/[%:]/g, "")
        .replace(/\s+/g, " ");
    }

    function findCell(rows, label) {
      const target = normalizeLabel(label);

      for (let r = 0; r < rows.length; r++) {
        for (let c = 0; c < rows[r].length; c++) {
          if (normalizeLabel(rows[r][c]) === target) {
            return { r, c };
          }
        }
      }

      return null;
    }

    function findValueRight(rows, label) {
      const cell = findCell(rows, label);

      if (!cell) return "";

      const row = rows[cell.r] || [];

      for (let c = cell.c + 1; c < row.length; c++) {
        const value = clean(row[c]);

        if (value !== "") {
          return value;
        }
      }

      return "";
    }

    function findTable(rows, firstHeader, headersWanted, maxRows = 8) {
      const start = findCell(rows, firstHeader);

      if (!start) return [];

      const headerRow = rows[start.r] || [];
      const headerIndexes = headersWanted.map(header => {
        const normalized = normalizeLabel(header);

        for (let c = start.c; c < headerRow.length; c++) {
          if (normalizeLabel(headerRow[c]) === normalized) {
            return c;
          }
        }

        return -1;
      });

      const output = [];

      for (let r = start.r + 1; r < Math.min(rows.length, start.r + 1 + maxRows); r++) {
        const row = rows[r] || [];
        const firstValue = clean(row[start.c]);

        if (!firstValue) continue;

        const item = {};

        headersWanted.forEach((header, i) => {
          const index = headerIndexes[i];
          item[header] = index >= 0 ? clean(row[index]) : "";
        });

        output.push(item);
      }

      return output;
    }

    function extractSummary(rows, sourceName) {
      const leftStats = [
        "Total Tracked Games",
        "Official Plays",
        "Wins",
        "Losses",
        "Pending Plays",
        "Win Rate",
        "Units Profit",
        "ROI",
        "Avg Edge",
        "Avg CLV",
        "YRFI Plays",
        "NRFI Plays",
        "No Plays"
      ];

      const accuracyStats = [
        "Games Graded",
        "Avg Model YRFI",
        "Actual YRFI Rate",
        "Avg Model NRFI",
        "Actual NRFI Rate",
        "Model Direction Accuracy",
        "Avg Best Edge",
        "Avg Model Confidence",
        "YRFI Picks Accuracy",
        "NRFI Picks Accuracy"
      ];

      const summary = {
        name: sourceName,
        left: {},
        accuracy: {},
        plays: [],
        buckets: []
      };

      leftStats.forEach(label => {
        summary.left[label] = findValueRight(rows, label);
      });

      accuracyStats.forEach(label => {
        summary.accuracy[label] = findValueRight(rows, label);
      });

      summary.plays = findTable(rows, "Play Type", [
        "Play Type",
        "Plays",
        "Wins",
        "Units",
        "ROI"
      ], 4);

      summary.buckets = findTable(rows, "Model YRFI Bucket", [
        "Model YRFI Bucket",
        "Games",
        "Avg Model YRFI",
        "Actual YRFI Rate",
        "Difference"
      ], 6);

      return summary;
    }

    /************************************************************
     * FORMATTING
     ************************************************************/

    function valueClass(value) {
      const raw = clean(value).replace("%", "");
      const num = Number(raw);

      if (Number.isNaN(num)) return "";

      if (num > 0) return "positive";
      if (num < 0) return "negative";
      return "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /************************************************************
     * LOAD + RENDER
     ************************************************************/

    async function loadSource(source) {
      if (!source.url || source.url.includes("PASTE_")) {
        return null;
      }

      const cacheBust = `v=${Date.now()}`;
      const separator = source.url.includes("?") ? "&" : "?";
      const url = `${source.url}${separator}${cacheBust}`;

      const response = await fetch(url);

      if (!response.ok) {
        throw new Error(`${source.name} failed to load: HTTP ${response.status}`);
      }

      const text = await response.text();
      const rows = parseCSV(text);

      return extractSummary(rows, source.name);
    }

    async function loadDashboard() {
      const grid = document.getElementById("modelGrid");

      try {
        const summaries = [];

        for (const source of SOURCES) {
          const summary = await loadSource(source);

          if (summary) {
            summaries.push(summary);
          }
        }

        renderSummaries(summaries);

        const now = new Date();

        document.getElementById("lastUpdated").textContent =
          `Last updated ${now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;

        document.getElementById("todayLabel").textContent =
          now.toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" });

      } catch (error) {
        console.error(error);

        grid.innerHTML = `
          <div class="empty">
            Could not load model summaries.<br />
            ${escapeHtml(error.message)}
          </div>
        `;

        document.getElementById("lastUpdated").textContent = "Data load error";
      }
    }

    function renderSummaries(summaries) {
      const grid = document.getElementById("modelGrid");

      if (summaries.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            No summary data loaded. Add your published CSV URLs in the SOURCES config.
          </div>
        `;
        return;
      }

      grid.innerHTML = summaries.map(summary => {
        return `
          <article class="model-card">
            <div class="model-header">
              <div>
                <div class="model-title">${escapeHtml(summary.name)}</div>
                <div class="model-tag">Backtest Summary</div>
              </div>
              <div class="status-pill">${escapeHtml(summary.left["Official Plays"] || "0")} Plays</div>
            </div>

            <div class="content">
              <div class="quick-grid">
                ${miniCard("Record", `${summary.left["Wins"] || "0"}-${summary.left["Losses"] || "0"}`)}
                ${miniCard("Units Profit", summary.left["Units Profit"], valueClass(summary.left["Units Profit"]))}
                ${miniCard("ROI", summary.left["ROI"], valueClass(summary.left["ROI"]))}
                ${miniCard("Avg CLV", summary.left["Avg CLV"], valueClass(summary.left["Avg CLV"]))}
              </div>

              <div class="section">
                <div class="section-title">Model Accuracy</div>
                <div class="stat-list">
                  ${statRow("Games Graded", summary.accuracy["Games Graded"])}
                  ${statRow("Avg Model YRFI", summary.accuracy["Avg Model YRFI"])}
                  ${statRow("Actual YRFI Rate", summary.accuracy["Actual YRFI Rate"])}
                  ${statRow("Avg Model NRFI", summary.accuracy["Avg Model NRFI"])}
                  ${statRow("Actual NRFI Rate", summary.accuracy["Actual NRFI Rate"])}
                  ${statRow("Direction Accuracy", summary.accuracy["Model Direction Accuracy"])}
                  ${statRow("Avg Best Edge", summary.accuracy["Avg Best Edge"])}
                  ${statRow("Avg Confidence", summary.accuracy["Avg Model Confidence"])}
                </div>
              </div>

              <div class="section">
                <div class="section-title">Play Type</div>
                ${renderPlayTable(summary.plays)}
              </div>

              <div class="section">
                <div class="section-title">YRFI Buckets</div>
                ${renderBucketTable(summary.buckets)}
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function miniCard(label, value, className = "") {
      return `
        <div class="mini-card">
          <div class="mini-label">${escapeHtml(label)}</div>
          <div class="mini-value ${className}">${escapeHtml(value || "—")}</div>
        </div>
      `;
    }

    function statRow(label, value) {
      return `
        <div class="stat-row">
          <div class="stat-label">${escapeHtml(label)}</div>
          <div class="stat-value ${valueClass(value)}">${escapeHtml(value || "—")}</div>
        </div>
      `;
    }

    function renderPlayTable(rows) {
      if (!rows.length) {
        return `<div class="empty">No play type table found.</div>`;
      }

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Type</th>
                <th>Plays</th>
                <th>Wins</th>
                <th>Units</th>
                <th>ROI</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  <td>${escapeHtml(row["Play Type"])}</td>
                  <td>${escapeHtml(row["Plays"])}</td>
                  <td>${escapeHtml(row["Wins"])}</td>
                  <td class="${valueClass(row["Units"])}">${escapeHtml(row["Units"])}</td>
                  <td class="${valueClass(row["ROI"])}">${escapeHtml(row["ROI"])}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderBucketTable(rows) {
      if (!rows.length) {
        return `<div class="empty">No bucket table found.</div>`;
      }

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Bucket</th>
                <th>Games</th>
                <th>Avg Model</th>
                <th>Actual</th>
                <th>Diff</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  <td>${escapeHtml(row["Model YRFI Bucket"])}</td>
                  <td>${escapeHtml(row["Games"])}</td>
                  <td>${escapeHtml(row["Avg Model YRFI"])}</td>
                  <td>${escapeHtml(row["Actual YRFI Rate"])}</td>
                  <td class="${valueClass(row["Difference"])}">${escapeHtml(row["Difference"])}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    loadDashboard();
    setInterval(loadDashboard, AUTO_REFRESH_MS);
  </script>
</body>
</html>
