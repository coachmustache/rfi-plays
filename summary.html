<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>YRFI / NRFI Model Summary</title>

  <style>
    :root {
      --bg: #0b1220;
      --card: #111a2b;
      --card2: #151f33;
      --text: #f4f7fb;
      --muted: #9ca8ba;
      --line: rgba(255,255,255,0.12);
      --green: #74c365;
      --red: #ff5b5b;
      --yellow: #f4c542;
      --blue: #5aa9ff;
      --shadow: 0 18px 40px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(39, 174, 96, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(90, 169, 255, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: min(1280px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 22px;
      border-bottom: 1px solid rgba(116, 195, 101, 0.55);
      padding-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .status-pill {
      background: rgba(116, 195, 101, 0.13);
      border: 1px solid rgba(116, 195, 101, 0.45);
      color: var(--green);
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
    }

    .model-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .model-card {
      background: linear-gradient(180deg, rgba(21,31,51,0.98), rgba(17,26,43,0.98));
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .model-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .model-title {
      font-size: 24px;
      font-weight: 950;
      letter-spacing: -0.02em;
    }

    .model-tag {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .content {
      padding: 18px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .mini-card {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px;
      min-height: 86px;
    }

    .mini-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1.25;
    }

    .mini-value {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 950;
    }

    .positive {
      color: var(--green);
    }

    .negative {
      color: var(--red);
    }

    .profit-chart-card {
      margin-bottom: 18px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .chart-title {
      font-size: 15px;
      font-weight: 950;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chart-title::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 12px rgba(116, 195, 101, 0.75);
    }

    .chart-value {
      font-size: 18px;
      font-weight: 950;
    }

    .chart-wrap {
      width: 100%;
      height: 180px;
    }

    .profit-chart {
      width: 100%;
      height: 100%;
      display: block;
    }

    .chart-axis {
      stroke: rgba(255,255,255,0.16);
      stroke-width: 1;
    }

    .chart-grid-line {
      stroke: rgba(255,255,255,0.07);
      stroke-width: 1;
    }

    .chart-line {
      fill: none;
      stroke: var(--green);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 7px rgba(116, 195, 101, 0.45));
    }

    .chart-area {
      fill: rgba(116, 195, 101, 0.10);
    }

    .chart-dot {
      fill: var(--green);
      stroke: var(--bg);
      stroke-width: 2;
    }

    .chart-label {
      fill: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .chart-empty {
      height: 150px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,0.16);
      border-radius: 14px;
    }

    .section {
      margin-top: 18px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 950;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 12px rgba(116, 195, 101, 0.75);
    }

    .stat-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 14px;
    }

    .stat-label {
      color: var(--muted);
      font-weight: 800;
    }

    .stat-value {
      font-weight: 950;
      text-align: right;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 480px;
    }

    th, td {
      padding: 10px 11px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 13px;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 950;
      background: rgba(255,255,255,0.035);
    }

    td {
      font-weight: 800;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .empty {
      text-align: center;
      padding: 38px 20px;
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(17, 26, 43, 0.55);
    }

    .footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 1080px) {
      .model-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .header {
        align-items: flex-start;
        flex-direction: column;
      }

      .quick-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat-list {
        grid-template-columns: 1fr;
      }

      .model-title {
        font-size: 20px;
      }
    }

    @media (max-width: 460px) {
      .page {
        width: min(100% - 18px, 1280px);
        padding-top: 18px;
      }

      .quick-grid {
        grid-template-columns: 1fr;
      }

      .content {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <div>
        <h1>YRFI / NRFI Model Summary</h1>
        <div class="subtitle" id="lastUpdated">Loading summary...</div>
      </div>
      <div class="status-pill" id="todayLabel">Today</div>
    </header>

    <section class="model-grid" id="modelGrid">
      <div class="empty">Loading model summaries...</div>
    </section>

    <div class="footer">
      Pulls from the published Game_Backtest CSV summary area. Auto-refreshes every 60 seconds.
    </div>
  </main>

  <script>
    /************************************************************
     * CONFIG
     * These must be published CSV links, not pubhtml links.
     ************************************************************/

    const SOURCES = [
      {
        name: "V1",
        url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_1lOdsXHuX6EVik0beeAUXFck7o0pOuElAB3B6tWoAh2n_wq2iID5IhLfbJJ19ijlU6Qfj-0_tVhi/pub?gid=1064158788&single=true&output=csv"
      },
      {
        name: "V2",
        url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7XfJbgPEN8Mo_nf1evZ3Hb7ec5il5MlOFEgSaClIPuHdEAUq7XMpN5Bc4XOPBas4hQj0juKsMZJr2/pub?gid=1064158788&single=true&output=csv"
      }
    ];

    const AUTO_REFRESH_MS = 60000;

    /************************************************************
     * CSV PARSER
     ************************************************************/

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
          continue;
        }

        if (char === '"') {
          inQuotes = !inQuotes;
          continue;
        }

        if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
          continue;
        }

        if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;

          row.push(cell);

          if (row.some(v => String(v).trim() !== "")) {
            rows.push(row);
          }

          row = [];
          cell = "";
          continue;
        }

        cell += char;
      }

      row.push(cell);

      if (row.some(v => String(v).trim() !== "")) {
        rows.push(row);
      }

      return rows;
    }

    /************************************************************
     * SUMMARY EXTRACTION
     ************************************************************/

    function clean(value) {
      return String(value ?? "").trim();
    }

    function normalizeLabel(value) {
      return clean(value)
        .toLowerCase()
        .replace(/[%:]/g, "")
        .replace(/\s+/g, " ");
    }

    function getCellRC(rows, r, c) {
      return clean(rows?.[r - 1]?.[c - 1] || "");
    }

    function findValueInRegion(rows, label, r1, c1, r2, c2) {
      const target = normalizeLabel(label);

      for (let r = r1; r <= r2; r++) {
        for (let c = c1; c <= c2; c++) {
          if (normalizeLabel(getCellRC(rows, r, c)) === target) {
            for (let nextC = c + 1; nextC <= c2 + 3; nextC++) {
              const value = getCellRC(rows, r, nextC);
              if (value !== "") return value;
            }
          }
        }
      }

      return "";
    }

    function extractSummary(rows, sourceName) {
      const summary = {
        name: sourceName,
        left: {},
        accuracy: {},
        plays: [],
        buckets: [],
        profitSeries: buildProfitSeries(rows)
      };

      // Left summary block: roughly columns A:B, rows 3:15
      summary.left = {
        "Total Tracked Games": findValueInRegion(rows, "Total Tracked Games", 3, 1, 15, 2),
        "Official Plays": findValueInRegion(rows, "Official Plays", 3, 1, 15, 2),
        "Wins": findValueInRegion(rows, "Wins", 3, 1, 15, 2),
        "Losses": findValueInRegion(rows, "Losses", 3, 1, 15, 2),
        "Pending Plays": findValueInRegion(rows, "Pending Plays", 3, 1, 15, 2),
        "Win Rate": findValueInRegion(rows, "Win Rate", 3, 1, 15, 2),
        "Units Profit": findValueInRegion(rows, "Units Profit", 3, 1, 15, 2),
        "ROI": findValueInRegion(rows, "ROI", 3, 1, 15, 2),
        "Avg Edge": findValueInRegion(rows, "Avg Edge", 3, 1, 15, 2),
        "Avg CLV": findValueInRegion(rows, "Avg CLV", 3, 1, 15, 2),
        "YRFI Plays": findValueInRegion(rows, "YRFI Plays", 3, 1, 15, 2),
        "NRFI Plays": findValueInRegion(rows, "NRFI Plays", 3, 1, 15, 2),
        "No Plays": findValueInRegion(rows, "No Plays", 3, 1, 15, 2)
      };

      // Model accuracy block: roughly columns D:G, rows 3:12
      summary.accuracy = {
        "Games Graded": findValueInRegion(rows, "Games Graded", 3, 4, 12, 7),
        "Avg Model YRFI": findValueInRegion(rows, "Avg Model YRFI", 3, 4, 12, 7),
        "Actual YRFI Rate": findValueInRegion(rows, "Actual YRFI Rate", 3, 4, 12, 7),
        "Avg Model NRFI": findValueInRegion(rows, "Avg Model NRFI", 3, 4, 12, 7),
        "Actual NRFI Rate": findValueInRegion(rows, "Actual NRFI Rate", 3, 4, 12, 7),
        "Model Direction Accuracy": findValueInRegion(rows, "Model Direction Accuracy", 3, 4, 12, 7),
        "Avg Best Edge": findValueInRegion(rows, "Avg Best Edge", 3, 4, 12, 7),
        "Avg Model Confidence": findValueInRegion(rows, "Avg Model Confidence", 3, 4, 12, 7),
        "YRFI Picks Accuracy": findValueInRegion(rows, "YRFI Picks Accuracy", 3, 4, 12, 7),
        "NRFI Picks Accuracy": findValueInRegion(rows, "NRFI Picks Accuracy", 3, 4, 12, 7)
      };

      // Play type table: H:L, rows 3:5
      summary.plays = [
        {
          "Play Type": getCellRC(rows, 3, 8),
          "Plays": getCellRC(rows, 3, 9),
          "Wins": getCellRC(rows, 3, 10),
          "Units": getCellRC(rows, 3, 11),
          "ROI": getCellRC(rows, 3, 12)
        },
        {
          "Play Type": getCellRC(rows, 4, 8),
          "Plays": getCellRC(rows, 4, 9),
          "Wins": getCellRC(rows, 4, 10),
          "Units": getCellRC(rows, 4, 11),
          "ROI": getCellRC(rows, 4, 12)
        },
        {
          "Play Type": getCellRC(rows, 5, 8),
          "Plays": getCellRC(rows, 5, 9),
          "Wins": getCellRC(rows, 5, 10),
          "Units": getCellRC(rows, 5, 11),
          "ROI": getCellRC(rows, 5, 12)
        }
      ].filter(row => row["Play Type"] && row["Play Type"] !== "Play Type");

      // Bucket table: M:Q, rows 3:7
      summary.buckets = [
        {
          "Model YRFI Bucket": getCellRC(rows, 3, 13),
          "Games": getCellRC(rows, 3, 14),
          "Avg Model YRFI": getCellRC(rows, 3, 15),
          "Actual YRFI Rate": getCellRC(rows, 3, 16),
          "Difference": getCellRC(rows, 3, 17)
        },
        {
          "Model YRFI Bucket": getCellRC(rows, 4, 13),
          "Games": getCellRC(rows, 4, 14),
          "Avg Model YRFI": getCellRC(rows, 4, 15),
          "Actual YRFI Rate": getCellRC(rows, 4, 16),
          "Difference": getCellRC(rows, 4, 17)
        },
        {
          "Model YRFI Bucket": getCellRC(rows, 5, 13),
          "Games": getCellRC(rows, 5, 14),
          "Avg Model YRFI": getCellRC(rows, 5, 15),
          "Actual YRFI Rate": getCellRC(rows, 5, 16),
          "Difference": getCellRC(rows, 5, 17)
        },
        {
          "Model YRFI Bucket": getCellRC(rows, 6, 13),
          "Games": getCellRC(rows, 6, 14),
          "Avg Model YRFI": getCellRC(rows, 6, 15),
          "Actual YRFI Rate": getCellRC(rows, 6, 16),
          "Difference": getCellRC(rows, 6, 17)
        },
        {
          "Model YRFI Bucket": getCellRC(rows, 7, 13),
          "Games": getCellRC(rows, 7, 14),
          "Avg Model YRFI": getCellRC(rows, 7, 15),
          "Actual YRFI Rate": getCellRC(rows, 7, 16),
          "Difference": getCellRC(rows, 7, 17)
        }
      ].filter(row => row["Model YRFI Bucket"] && row["Model YRFI Bucket"] !== "Model YRFI Bucket");

      return summary;
    }

    /************************************************************
     * FORMATTING + CHART HELPERS
     ************************************************************/

    function valueClass(value) {
      const raw = clean(value).replace("%", "");
      const num = Number(raw);

      if (Number.isNaN(num)) return "";

      if (num > 0) return "positive";
      if (num < 0) return "negative";
      return "";
    }

    function parseNumber(value) {
      const raw = clean(value)
        .replace("%", "")
        .replace("+", "")
        .replace("u", "")
        .replace(",", "");

      const num = Number(raw);

      return Number.isNaN(num) ? null : num;
    }

    function normalizeDateForChart(value) {
      const text = clean(value);

      if (!text) return "";

      const parsed = new Date(text);

      if (Number.isNaN(parsed.getTime())) {
        return text;
      }

      const yyyy = parsed.getFullYear();
      const mm = String(parsed.getMonth() + 1).padStart(2, "0");
      const dd = String(parsed.getDate()).padStart(2, "0");

      return `${yyyy}-${mm}-${dd}`;
    }

    function shortDateLabel(dateText) {
      const parsed = new Date(dateText);

      if (Number.isNaN(parsed.getTime())) {
        return dateText;
      }

      return parsed.toLocaleDateString([], {
        month: "numeric",
        day: "numeric"
      });
    }

    function buildProfitSeries(rows) {
      /*
        Game_Backtest columns:
        A = Date
        W = Units Won/Lost
      */
      const DATE_COL = 0;
      const UNITS_COL = 22;

      const groupedByDate = new Map();

      rows.forEach(row => {
        const date = normalizeDateForChart(row[DATE_COL]);
        const units = parseNumber(row[UNITS_COL]);

        if (!date || units === null) return;

        groupedByDate.set(date, (groupedByDate.get(date) || 0) + units);
      });

      const sortedDates = [...groupedByDate.keys()].sort((a, b) => {
        return new Date(a).getTime() - new Date(b).getTime();
      });

      let cumulative = 0;

      const series = sortedDates.map(date => {
        cumulative += groupedByDate.get(date);

        return {
          date,
          label: shortDateLabel(date),
          value: Number(cumulative.toFixed(2))
        };
      });

      if (series.length > 0) {
        series.unshift({
          date: "Start",
          label: "Start",
          value: 0
        });
      }

      return series;
    }

    function formatUnitsValue(value) {
      const num = Number(value || 0);

      if (num > 0) return `+${num.toFixed(2)}u`;
      if (num < 0) return `${num.toFixed(2)}u`;

      return "0.00u";
    }

    function renderProfitChart(series) {
      if (!series || series.length < 2) {
        return `
          <div class="profit-chart-card">
            <div class="chart-header">
              <div class="chart-title">Profit Over Time</div>
              <div class="chart-value">0.00u</div>
            </div>
            <div class="chart-empty">No graded profit data yet.</div>
          </div>
        `;
      }

      const width = 640;
      const height = 180;
      const padX = 34;
      const padTop = 18;
      const padBottom = 28;
      const chartW = width - padX * 2;
      const chartH = height - padTop - padBottom;

      const values = series.map(point => point.value);
      let min = Math.min(...values, 0);
      let max = Math.max(...values, 0);

      if (min === max) {
        min -= 1;
        max += 1;
      }

      const range = max - min;

      const xFor = index => {
        if (series.length === 1) return padX;
        return padX + (index / (series.length - 1)) * chartW;
      };

      const yFor = value => {
        return padTop + ((max - value) / range) * chartH;
      };

      const points = series.map((point, index) => {
        return {
          ...point,
          x: xFor(index),
          y: yFor(point.value)
        };
      });

      const linePath = points
        .map((point, index) => `${index === 0 ? "M" : "L"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`)
        .join(" ");

      const areaPath =
        `${linePath} L ${points[points.length - 1].x.toFixed(2)} ${yFor(0).toFixed(2)} ` +
        `L ${points[0].x.toFixed(2)} ${yFor(0).toFixed(2)} Z`;

      const zeroY = yFor(0);
      const last = series[series.length - 1];

      const firstDate = points[1]?.label || "";
      const lastDate = points[points.length - 1]?.label || "";

      return `
        <div class="profit-chart-card">
          <div class="chart-header">
            <div class="chart-title">Profit Over Time</div>
            <div class="chart-value ${valueClass(last.value)}">${escapeHtml(formatUnitsValue(last.value))}</div>
          </div>

          <div class="chart-wrap">
            <svg class="profit-chart" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
              <line class="chart-grid-line" x1="${padX}" y1="${padTop}" x2="${width - padX}" y2="${padTop}" />
              <line class="chart-grid-line" x1="${padX}" y1="${padTop + chartH / 2}" x2="${width - padX}" y2="${padTop + chartH / 2}" />
              <line class="chart-grid-line" x1="${padX}" y1="${padTop + chartH}" x2="${width - padX}" y2="${padTop + chartH}" />

              <line class="chart-axis" x1="${padX}" y1="${zeroY}" x2="${width - padX}" y2="${zeroY}" />

              <path class="chart-area" d="${areaPath}" />
              <path class="chart-line" d="${linePath}" />

              ${points.map(point => `
                <circle class="chart-dot" cx="${point.x.toFixed(2)}" cy="${point.y.toFixed(2)}" r="3.5" />
              `).join("")}

              <text class="chart-label" x="${padX}" y="${height - 8}" text-anchor="start">${escapeHtml(firstDate)}</text>
              <text class="chart-label" x="${width - padX}" y="${height - 8}" text-anchor="end">${escapeHtml(lastDate)}</text>
              <text class="chart-label" x="${padX}" y="${padTop + 10}" text-anchor="start">${escapeHtml(formatUnitsValue(max))}</text>
              <text class="chart-label" x="${padX}" y="${padTop + chartH - 4}" text-anchor="start">${escapeHtml(formatUnitsValue(min))}</text>
            </svg>
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /************************************************************
     * LOAD + RENDER
     ************************************************************/

    async function loadSource(source) {
      if (!source.url || source.url.includes("PASTE_")) {
        return null;
      }

      const cacheBust = `v=${Date.now()}`;
      const separator = source.url.includes("?") ? "&" : "?";
      const url = `${source.url}${separator}${cacheBust}`;

      const response = await fetch(url);

      if (!response.ok) {
        throw new Error(`${source.name} failed to load: HTTP ${response.status}`);
      }

      const text = await response.text();
      const rows = parseCSV(text);

      return extractSummary(rows, source.name);
    }

    async function loadDashboard() {
      const grid = document.getElementById("modelGrid");

      try {
        const summaries = [];

        for (const source of SOURCES) {
          const summary = await loadSource(source);

          if (summary) {
            summaries.push(summary);
          }
        }

        renderSummaries(summaries);

        const now = new Date();

        document.getElementById("lastUpdated").textContent =
          `Last updated ${now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;

        document.getElementById("todayLabel").textContent =
          now.toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" });

      } catch (error) {
        console.error(error);

        grid.innerHTML = `
          <div class="empty">
            Could not load model summaries.<br />
            ${escapeHtml(error.message)}
          </div>
        `;

        document.getElementById("lastUpdated").textContent = "Data load error";
      }
    }

    function renderSummaries(summaries) {
      const grid = document.getElementById("modelGrid");

      if (summaries.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            No summary data loaded. Add your published CSV URLs in the SOURCES config.
          </div>
        `;
        return;
      }

      grid.innerHTML = summaries.map(summary => {
        return `
          <article class="model-card">
            <div class="model-header">
              <div>
                <div class="model-title">${escapeHtml(summary.name)}</div>
                <div class="model-tag">Backtest Summary</div>
              </div>
              <div class="status-pill">${escapeHtml(summary.left["Official Plays"] || "0")} Plays</div>
            </div>

            <div class="content">
              <div class="quick-grid">
                ${miniCard("Record", `${summary.left["Wins"] || "0"}-${summary.left["Losses"] || "0"}`)}
                ${miniCard("Units Profit", summary.left["Units Profit"], valueClass(summary.left["Units Profit"]))}
                ${miniCard("ROI", summary.left["ROI"], valueClass(summary.left["ROI"]))}
                ${miniCard("Avg CLV", summary.left["Avg CLV"], valueClass(summary.left["Avg CLV"]))}
              </div>

              ${renderProfitChart(summary.profitSeries)}

              <div class="section">
                <div class="section-title">Model Accuracy</div>
                <div class="stat-list">
                  ${statRow("Games Graded", summary.accuracy["Games Graded"])}
                  ${statRow("Avg Model YRFI", summary.accuracy["Avg Model YRFI"])}
                  ${statRow("Actual YRFI Rate", summary.accuracy["Actual YRFI Rate"])}
                  ${statRow("Avg Model NRFI", summary.accuracy["Avg Model NRFI"])}
                  ${statRow("Actual NRFI Rate", summary.accuracy["Actual NRFI Rate"])}
                  ${statRow("Direction Accuracy", summary.accuracy["Model Direction Accuracy"])}
                  ${statRow("Avg Best Edge", summary.accuracy["Avg Best Edge"])}
                  ${statRow("Avg Confidence", summary.accuracy["Avg Model Confidence"])}
                </div>
              </div>

              <div class="section">
                <div class="section-title">Play Type</div>
                ${renderPlayTable(summary.plays)}
              </div>

              <div class="section">
                <div class="section-title">YRFI Buckets</div>
                ${renderBucketTable(summary.buckets)}
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function miniCard(label, value, className = "") {
      return `
        <div class="mini-card">
          <div class="mini-label">${escapeHtml(label)}</div>
          <div class="mini-value ${className}">${escapeHtml(value || "—")}</div>
        </div>
      `;
    }

    function statRow(label, value) {
      return `
        <div class="stat-row">
          <div class="stat-label">${escapeHtml(label)}</div>
          <div class="stat-value ${valueClass(value)}">${escapeHtml(value || "—")}</div>
        </div>
      `;
    }

    function renderPlayTable(rows) {
      if (!rows.length) {
        return `<div class="empty">No play type table found.</div>`;
      }

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Type</th>
                <th>Plays</th>
                <th>Wins</th>
                <th>Units</th>
                <th>ROI</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  <td>${escapeHtml(row["Play Type"])}</td>
                  <td>${escapeHtml(row["Plays"])}</td>
                  <td>${escapeHtml(row["Wins"])}</td>
                  <td class="${valueClass(row["Units"])}">${escapeHtml(row["Units"])}</td>
                  <td class="${valueClass(row["ROI"])}">${escapeHtml(row["ROI"])}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderBucketTable(rows) {
      if (!rows.length) {
        return `<div class="empty">No bucket table found.</div>`;
      }

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Bucket</th>
                <th>Games</th>
                <th>Avg Model</th>
                <th>Actual</th>
                <th>Diff</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  <td>${escapeHtml(row["Model YRFI Bucket"])}</td>
                  <td>${escapeHtml(row["Games"])}</td>
                  <td>${escapeHtml(row["Avg Model YRFI"])}</td>
                  <td>${escapeHtml(row["Actual YRFI Rate"])}</td>
                  <td class="${valueClass(row["Difference"])}">${escapeHtml(row["Difference"])}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    loadDashboard();
    setInterval(loadDashboard, AUTO_REFRESH_MS);
  </script>
</body>
</html>
