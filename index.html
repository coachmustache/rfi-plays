<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Daily YRFI / NRFI Plays</title>

  <style>
    :root {
      --bg: #0b1220;
      --card: #111a2b;
      --card2: #151f33;
      --text: #f4f7fb;
      --muted: #9ca8ba;
      --line: rgba(255,255,255,0.12);
      --green: #74c365;
      --red: #ff5b5b;
      --yellow: #f4c542;
      --blue: #5aa9ff;
      --shadow: 0 18px 40px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(39, 174, 96, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(90, 169, 255, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 22px;
      border-bottom: 1px solid rgba(116, 195, 101, 0.55);
      padding-bottom: 16px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .status-pill {
      background: rgba(116, 195, 101, 0.13);
      border: 1px solid rgba(116, 195, 101, 0.45);
      color: var(--green);
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-card {
      background: rgba(17, 26, 43, 0.82);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .summary-value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 900;
    }

    .section-title {
      margin: 24px 0 12px;
      font-size: 18px;
      font-weight: 900;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 16px rgba(116, 195, 101, 0.75);
    }

    .plays-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .play-card {
      position: relative;
      background: linear-gradient(180deg, rgba(21,31,51,0.98), rgba(17,26,43,0.98));
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .play-card.win {
      border-color: rgba(116, 195, 101, 0.9);
      box-shadow: 0 0 0 1px rgba(116, 195, 101, 0.2), var(--shadow);
    }

    .play-card.loss {
      border-color: rgba(255, 91, 91, 0.9);
      box-shadow: 0 0 0 1px rgba(255, 91, 91, 0.2), var(--shadow);
    }

    .play-card.pending {
      border-color: rgba(255,255,255,0.14);
    }

    .model-strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255,255,255,0.045);
      border-bottom: 1px solid var(--line);
      gap: 12px;
    }

    .model-name {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-badge {
      font-size: 12px;
      font-weight: 900;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--muted);
    }

    .win .result-badge {
      background: rgba(116, 195, 101, 0.14);
      color: var(--green);
    }

    .loss .result-badge {
      background: rgba(255, 91, 91, 0.14);
      color: var(--red);
    }

    .card-body {
      padding: 16px;
    }

    .matchup {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .team.home {
      justify-content: flex-end;
      text-align: right;
    }

    .team-logo {
      width: 42px;
      height: 42px;
      object-fit: contain;
      flex: 0 0 auto;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.35));
    }

    .team-code {
      font-size: 22px;
      font-weight: 950;
      white-space: nowrap;
    }

    .at {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .detail {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px;
      min-height: 70px;
    }

    .detail-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
    }

    .detail-value {
      font-size: 18px;
      font-weight: 950;
    }

    .play-yrfi {
      color: var(--green);
    }

    .play-nrfi {
      color: var(--blue);
    }

    .empty {
      text-align: center;
      padding: 38px 20px;
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(17, 26, 43, 0.55);
    }

    .footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 900px) {
      .header {
        align-items: flex-start;
        flex-direction: column;
      }

      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .plays-grid {
        grid-template-columns: 1fr;
      }

      .details {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .page {
        width: min(100% - 18px, 1180px);
        padding-top: 18px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .team-logo {
        width: 34px;
        height: 34px;
      }

      .team-code {
        font-size: 18px;
      }

      .details {
        gap: 8px;
      }

      .detail {
        padding: 9px;
      }

      .detail-value {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <div class="title-wrap">
        <h1>Daily YRFI / NRFI Plays</h1>
        <div class="subtitle" id="lastUpdated">Loading plays...</div>
      </div>
      <div class="status-pill" id="todayLabel">Today</div>
    </header>

    <section class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">Total Plays</div>
        <div class="summary-value" id="totalPlays">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Pending</div>
        <div class="summary-value" id="pendingPlays">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Wins</div>
        <div class="summary-value" id="wins">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Losses</div>
        <div class="summary-value" id="losses">0</div>
      </div>
    </section>

    <div class="section-title">Today's Plays</div>

    <section class="plays-grid" id="playsGrid">
      <div class="empty">Loading today’s plays...</div>
    </section>

    <div class="footer">
      Auto-refreshes every 60 seconds. Results turn green/red once column U is filled.
    </div>
  </main>

  <script>
    /************************************************************
     * CONFIG
     *
     * Publish each Game_Backtest sheet to the web as CSV.
     * Then paste the CSV URLs below.
     ************************************************************/

    const SOURCES = [
      {
        name: "V1",
        url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_1lOdsXHuX6EVik0beeAUXFck7o0pOuElAB3B6tWoAh2n_wq2iID5IhLfbJJ19ijlU6Qfj-0_tVhi/pub?gid=1064158788&single=true&output=csv"
      },
      {
        name: "V2",
        url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7XfJbgPEN8Mo_nf1evZ3Hb7ec5il5MlOFEgSaClIPuHdEAUq7XMpN5Bc4XOPBas4hQj0juKsMZJr2/pub?gid=1064158788&single=true&output=csv"
      }
    ];

    const AUTO_REFRESH_MS = 60000;

    /************************************************************
     * BACKTEST COLUMN MAP
     *
     * A Date
     * C Away
     * D Home
     * Q Recommended Play
     * R Bet Odds
     * U Actual Result
     * X Game Time
     * Y Game ID
     * Z Play To Odds
     ************************************************************/

    const COL = {
      date: 0,       // A
      game: 1,       // B
      away: 2,       // C
      home: 3,       // D
      play: 16,      // Q
      odds: 17,      // R
      result: 20,    // U
      gameTime: 23,  // X
      gameId: 24,    // Y
      playTo: 25     // Z
    };

    const TEAM_IDS = {
      "ARI": 109, "AZ": 109,
      "ATL": 144,
      "BAL": 110,
      "BOS": 111,
      "CHC": 112,
      "CIN": 113,
      "CLE": 114,
      "COL": 115,
      "CWS": 145, "CHW": 145,
      "DET": 116,
      "HOU": 117,
      "KC": 118,
      "LAA": 108,
      "LAD": 119,
      "MIA": 146,
      "MIL": 158,
      "MIN": 142,
      "NYM": 121,
      "NYY": 147,
      "ATH": 133, "OAK": 133,
      "PHI": 143,
      "PIT": 134,
      "SD": 135,
      "SEA": 136,
      "SF": 137,
      "STL": 138,
      "TB": 139,
      "TEX": 140,
      "TOR": 141,
      "WSH": 120
    };

    function teamLogo(teamCode) {
      const code = String(teamCode || "").trim().toUpperCase();
      const id = TEAM_IDS[code];

      if (!id) {
        return "";
      }

      return `https://www.mlbstatic.com/team-logos/${id}.svg`;
    }

    function normalizeTeam(team) {
      return String(team || "").trim().toUpperCase();
    }

    function formatOdds(value) {
      if (value === null || value === undefined || value === "") return "";

      const raw = String(value).trim();

      if (raw === "") return "";

      const num = Number(raw.replace("+", ""));

      if (Number.isNaN(num)) return raw;

      return num > 0 ? `+${num}` : `${num}`;
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
          continue;
        }

        if (char === '"') {
          inQuotes = !inQuotes;
          continue;
        }

        if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
          continue;
        }

        if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;

          row.push(cell);

          if (row.some(v => String(v).trim() !== "")) {
            rows.push(row);
          }

          row = [];
          cell = "";
          continue;
        }

        cell += char;
      }

      row.push(cell);

      if (row.some(v => String(v).trim() !== "")) {
        rows.push(row);
      }

      return rows;
    }

    function todayKeys() {
      const now = new Date();

      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");

      const m = now.getMonth() + 1;
      const d = now.getDate();
      const yy = String(now.getFullYear()).slice(-2);

      return new Set([
        `${yyyy}-${mm}-${dd}`,
        `${m}/${d}/${yyyy}`,
        `${m}/${d}/${yy}`,
        `${mm}/${dd}/${yyyy}`,
        `${mm}/${dd}/${yy}`
      ]);
    }

    function normalizeDateText(value) {
      const text = String(value || "").trim();

      if (!text) return "";

      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) {
        return text;
      }

      const parsed = new Date(text);

      if (!Number.isNaN(parsed.getTime())) {
        const yyyy = parsed.getFullYear();
        const mm = String(parsed.getMonth() + 1).padStart(2, "0");
        const dd = String(parsed.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }

      return text;
    }

    function isToday(value) {
      const text = String(value || "").trim();
      const normalized = normalizeDateText(text);
      const keys = todayKeys();

      return keys.has(text) || keys.has(normalized);
    }

    function resultStatus(play, result) {
      const p = String(play || "").trim().toUpperCase();
      const r = String(result || "").trim().toUpperCase();

      if (!r) return "pending";
      if (p === r) return "win";
      return "loss";
    }

    function statusLabel(status, result) {
      if (status === "win") return `Won (${result})`;
      if (status === "loss") return `Lost (${result})`;
      return "Pending";
    }

    function readBacktestRows(rows, sourceName) {
      return rows
        .slice(1)
        .map(row => {
          const play = String(row[COL.play] || "").trim().toUpperCase();

          return {
            source: sourceName,
            date: row[COL.date],
            game: row[COL.game],
            away: normalizeTeam(row[COL.away]),
            home: normalizeTeam(row[COL.home]),
            play,
            odds: row[COL.odds],
            result: String(row[COL.result] || "").trim().toUpperCase(),
            gameTime: row[COL.gameTime],
            gameId: row[COL.gameId],
            playTo: row[COL.playTo]
          };
        })
        .filter(item => {
          return (
            isToday(item.date) &&
            (item.play === "YRFI" || item.play === "NRFI")
          );
        });
    }

    function sortPlays(a, b) {
      const timeA = new Date(`1/1/2000 ${a.gameTime || "11:59 PM"}`).getTime();
      const timeB = new Date(`1/1/2000 ${b.gameTime || "11:59 PM"}`).getTime();

      if (timeA !== timeB) return timeA - timeB;

      if (a.away !== b.away) return a.away.localeCompare(b.away);
      if (a.home !== b.home) return a.home.localeCompare(b.home);

      return a.source.localeCompare(b.source);
    }

    async function loadSource(source) {
      if (!source.url || source.url.includes("PASTE_")) {
        return [];
      }

      const cacheBust = `v=${Date.now()}`;
      const separator = source.url.includes("?") ? "&" : "?";
      const url = `${source.url}${separator}${cacheBust}`;

      const response = await fetch(url);

      if (!response.ok) {
        throw new Error(`${source.name} failed to load: HTTP ${response.status}`);
      }

      const text = await response.text();
      const rows = parseCSV(text);

      return readBacktestRows(rows, source.name);
    }

    async function loadDashboard() {
      const playsGrid = document.getElementById("playsGrid");

      try {
        const all = [];

        for (const source of SOURCES) {
          const sourceRows = await loadSource(source);
          all.push(...sourceRows);
        }

        all.sort(sortPlays);

        renderSummary(all);
        renderPlays(all);

        const now = new Date();

        document.getElementById("lastUpdated").textContent =
          `Last updated ${now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;

        document.getElementById("todayLabel").textContent =
          now.toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" });

      } catch (error) {
        console.error(error);

        playsGrid.innerHTML = `
          <div class="empty">
            Could not load plays.<br />
            ${error.message}
          </div>
        `;

        document.getElementById("lastUpdated").textContent =
          "Data load error";
      }
    }

    function renderSummary(plays) {
      const pending = plays.filter(p => resultStatus(p.play, p.result) === "pending").length;
      const wins = plays.filter(p => resultStatus(p.play, p.result) === "win").length;
      const losses = plays.filter(p => resultStatus(p.play, p.result) === "loss").length;

      document.getElementById("totalPlays").textContent = plays.length;
      document.getElementById("pendingPlays").textContent = pending;
      document.getElementById("wins").textContent = wins;
      document.getElementById("losses").textContent = losses;
    }

    function renderPlays(plays) {
      const playsGrid = document.getElementById("playsGrid");

      if (plays.length === 0) {
        playsGrid.innerHTML = `
          <div class="empty">
            No official plays copied to the backtest for today yet.
          </div>
        `;
        return;
      }

      playsGrid.innerHTML = plays.map(play => {
        const status = resultStatus(play.play, play.result);
        const awayLogo = teamLogo(play.away);
        const homeLogo = teamLogo(play.home);

        return `
          <article class="play-card ${status}">
            <div class="model-strip">
              <div class="model-name">${escapeHtml(play.source)} · ${escapeHtml(play.game || "")}</div>
              <div class="result-badge">${escapeHtml(statusLabel(status, play.result))}</div>
            </div>

            <div class="card-body">
              <div class="matchup">
                <div class="team away">
                  ${awayLogo ? `<img class="team-logo" src="${awayLogo}" alt="${escapeHtml(play.away)} logo" />` : ""}
                  <div class="team-code">${escapeHtml(play.away)}</div>
                </div>

                <div class="at">@</div>

                <div class="team home">
                  <div class="team-code">${escapeHtml(play.home)}</div>
                  ${homeLogo ? `<img class="team-logo" src="${homeLogo}" alt="${escapeHtml(play.home)} logo" />` : ""}
                </div>
              </div>

              <div class="details">
                <div class="detail">
                  <div class="detail-label">Game Time</div>
                  <div class="detail-value">${escapeHtml(play.gameTime || "—")}</div>
                </div>

                <div class="detail">
                  <div class="detail-label">Play</div>
                  <div class="detail-value ${play.play === "YRFI" ? "play-yrfi" : "play-nrfi"}">
                    ${escapeHtml(play.play)}
                  </div>
                </div>

                <div class="detail">
                  <div class="detail-label">Odds</div>
                  <div class="detail-value">${escapeHtml(formatOdds(play.odds) || "—")}</div>
                </div>

                <div class="detail">
                  <div class="detail-label">Play To</div>
                  <div class="detail-value">${escapeHtml(formatOdds(play.playTo) || "—")}</div>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadDashboard();
    setInterval(loadDashboard, AUTO_REFRESH_MS);
  </script>
</body>
</html>
